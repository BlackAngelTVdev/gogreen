<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>goGreen</title>
    <style>
      :root {
        color-scheme: light;
        --panel: rgba(255, 255, 255, 0.84);
        --panel-border: rgba(15, 23, 42, 0.12);
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f8b55;
        --accent-strong: #0b6e43;
        --art: #c15428;
        --art-strong: #8f3f1f;
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 139, 85, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(15, 139, 85, 0.12), transparent 28%),
          linear-gradient(135deg, #f7f7f1 0%, #eef5ef 100%);
      }

      main {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      .landing-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }

      @media (max-width: 860px) {
        .landing-grid {
          grid-template-columns: 1fr;
        }
      }

      .split-card {
        position: relative;
        overflow: hidden;
        display: grid;
        align-content: end;
        padding: 28px;
        min-height: 320px;
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .split-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 28px 70px rgba(15, 23, 42, 0.16);
      }

      .split-card::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0.14;
        pointer-events: none;
      }

      .split-card.faker::before {
        background: linear-gradient(145deg, rgba(15, 139, 85, 0.92), rgba(15, 139, 85, 0.1));
      }

      .split-card.art::before {
        background: linear-gradient(145deg, rgba(193, 84, 40, 0.92), rgba(193, 84, 40, 0.1));
      }

      .split-card-content {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 12px;
      }

      .split-card h2 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        letter-spacing: -0.05em;
      }

      .split-card p {
        margin: 0;
        max-width: 34ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .split-chip {
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .split-card.faker .split-chip {
        color: var(--accent-strong);
      }

      .split-card.art .split-chip {
        color: var(--art-strong);
      }

      .split-card .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        margin-top: 4px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.94);
        color: white;
        font-weight: 700;
      }

      .split-card.art .cta {
        background: rgba(193, 84, 40, 0.95);
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(15, 139, 85, 0.12);
        color: var(--accent-strong);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 5vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      .subtitle {
        margin: 0;
        max-width: 66ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.6;
      }

    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <span class="eyebrow">goGreen local</span>
        <h1>Choisis un univers.</h1>
        <!-- <p class="subtitle">Deux pages séparées: GoGreen Faker pour l’outil déjà en place, et GoGreen Art pour la suite.</p> -->
      </div>

      <div class="landing-grid">
        <a class="split-card faker" href="/faker">
          <div class="split-card-content">
            <span class="split-chip">Mode actif</span>
            <h2>GoGreen Faker</h2>
            <p>Ouvre le générateur de commits que tu as déjà.</p>
            <span class="cta">Entrer dans Faker</span>
          </div>
        </a>

        <a class="split-card art" href="/art">
          <div class="split-card-content">
            <span class="split-chip">Bientôt</span>
            <h2>GoGreen Art</h2>
            <p>La page Art sera faite après, mais la porte est déjà séparée.</p>
            <span class="cta">Voir Art</span>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
